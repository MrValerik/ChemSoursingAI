server {
  listen 80;

  # API: /api/* -> backend:8000/* (префикс /api срезается слэшем в proxy_pass)
  location /api/ {
    proxy_pass http://backend:8000/;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
  }

  # SPA: всё остальное отдаём из статики, неизвестные пути -> index.html
  location / {
    root /usr/share/nginx/html;
    try_files $uri $uri/ /index.html;
  }
}
