# ChemSource AI — запуск всей системы одной командой:
#   docker compose up --build
# Открыть в браузере: http://localhost:5173

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: chemsource
      POSTGRES_USER: chemsource
      POSTGRES_PASSWORD: chemsource
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U chemsource -d chemsource"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine

  backend:
    build: ./backend
    environment:
      APP_ENV: production
      DATABASE_URL: postgresql+psycopg://chemsource:chemsource@db:5432/chemsource
      REDIS_URL: redis://redis:6379/0
      LLM_BASE_URL: ${LLM_BASE_URL:-http://host.docker.internal:8080/v1}
      LLM_MODEL: ${LLM_MODEL:-qwen3-8b}
    depends_on:
      db:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  pgdata:
